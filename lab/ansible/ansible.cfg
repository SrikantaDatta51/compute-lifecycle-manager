[defaults]
inventory         = inventory/hosts.yml
roles_path        = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback   = default
# callbacks_enabled = timer, profile_tasks
forks             = 10
timeout           = 60

[privilege_escalation]
become            = True
become_method     = sudo
become_user       = root
become_ask_pass   = False
