---
# ═══════════════════════════════════════════════════════════════════
# BCM Lab — Ansible Inventory
# ═══════════════════════════════════════════════════════════════════
#
# Architecture:
#   Ansible → SSH → BCM Head Node → cmsh → Compute Nodes
#
# All operations run FROM the BCM head node using cmsh.
# Ansible never connects directly to compute nodes.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/<play>.yml \
#       -e "targets=['cpu-n01','cpu-n02']"
# ═══════════════════════════════════════════════════════════════════

all:
  children:
    bcm_headnodes:
      hosts:
        bcm-head:
          ansible_host: "192.168.200.254"
          ansible_user: root
          ansible_ssh_pass: "aadya123"
          # Alternative: use SSH key (uncomment below, comment out ssh_pass)
          # ansible_ssh_private_key_file: "~/.ssh/bcm_lab_key"

    # Logical groups — these are NOT SSH targets.
    # They define which nodes cmsh manages.
    cpu_nodes:
      hosts:
        cpu-n01: {}
        cpu-n02: {}
      vars:
        node_category: "cpu"
        slurm_partition: "cpu"

    gpu_nodes:
      hosts:
        gpu-n01: {}
      vars:
        node_category: "gpu"
        slurm_partition: "gpu"
        gpu_count: 1
        gpu_type: "virtual-gpu"

  vars:
    # ── BCM Paths ──
    cmsh_bin: /usr/bin/cmsh
    cm_shared_path: /cm/shared

    # ── Lab-Specific ──
    bcm_version: "11.0"
    cluster_name: "bcm-lab"
    head_node: "bcm-head"

    # ── Slurm ──
    slurm_partitions:
      - name: cpu
        nodes: "cpu-n[01-02]"
        default: "yes"
        max_time: "24:00:00"
      - name: gpu
        nodes: "gpu-n01"
        default: "no"
        max_time: "48:00:00"
        gres: "gpu:1"

    # ── Debug Bundle ──
    debug_bundle_dir: "/cm/shared/debug-bundles"
