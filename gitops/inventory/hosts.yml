---
# BCM Ansible GitOps — Inventory
# All operations are executed FROM the BCM head node using cmsh/ipmitool.
# Ansible connects to the head node only — never to compute nodes directly.

all:
  children:
    bcm_headnodes:
      hosts:
        bcm-head-01:
          ansible_host: "{{ lookup('env', 'BCM_HEAD_IP') | default('10.0.0.1', true) }}"
          ansible_user: "{{ lookup('env', 'BCM_HEAD_USER') | default('root', true) }}"
          ansible_ssh_private_key_file: "{{ lookup('env', 'BCM_SSH_KEY') | default('~/.ssh/id_rsa', true) }}"

  vars:
    # ── CM Shared Storage ──
    cm_shared_path: /cm/shared
    debug_bundle_dir: "{{ cm_shared_path }}/debug-bundles"

    # ── S3 Configuration ──
    s3_bucket: "{{ lookup('env', 'NVIDIA_DEBUG_S3_BUCKET') | default('nvidia-debug-bundles', true) }}"
    s3_region: "{{ lookup('env', 'AWS_DEFAULT_REGION') | default('us-west-2', true) }}"
    s3_presign_expiry: 86400  # 24 hours

    # ── Node Defaults ──
    node_spec: "dgx-b200-[001-064]"
    cmsh_timeout: 120
