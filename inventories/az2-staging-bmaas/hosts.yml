      hosts:
        stg-cpu-001:
          ansible_host: 10.10.200.1
        stg-cpu-002:
          ansible_host: 10.10.200.2
        stg-cpu-003:
          ansible_host: 10.10.200.3
      vars:
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    gpu_nodes:
      hosts:
        stg-gpu-001:
          ansible_host: 10.10.200.10
    cpu_nodes:
      hosts:
        stg-cpu-001:
          ansible_host: 10.10.200.1
        stg-cpu-002:
          ansible_host: 10.10.200.2
        stg-cpu-003:
          ansible_host: 10.10.200.3
