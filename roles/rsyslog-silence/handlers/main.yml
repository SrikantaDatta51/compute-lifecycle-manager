---
# ─── RSyslog Silence — Handlers ──────────────────────────────────────

- name: validate rsyslog config
  command: rsyslogd -N1
  changed_when: false

- name: restart rsyslog
  systemd:
    name: rsyslog
    state: restarted
    daemon_reload: yes

- name: reload rsyslog
  systemd:
    name: rsyslog
    state: reloaded
