#      start its test suite (stress tests, memory, GPU, storage)
#   3. Waits for the test harness to report results
#   4. On success: labels the node as "production" (schedulable)
#   5. Records the node as certified in the certified-nodes ConfigMap
#
# If burn-in fails, the node stays in "burn-in" phase and the CR
# transitions to Failed for investigation by the hardware team.
