# Compute Platform Operator — Helm Values
# ========================================
# This file controls ALL operator behavior. The workflow steps below
# define the complete reconciliation and cleanup logic. To support a
# different operational scenario, replace the workflow steps — no code
# changes, no rebuild required.
#
# ┌─────────────────────────────────────────────────────────────┐
# │  Supported Scenarios (same binary, different YAML):        │
# │                                                             │
# │  1. Node Assignment  — Claim a node for a workload group   │
# │  2. Node Swap        — Move node between owners via CRs    │
# │  3. Node Decommission — Drain + record decommissioned node │
# │  4. Node Health Gate  — Block until GPU/network checks pass│
# │  5. Burn-In           — Orchestrate burn-in + certify node │
# └─────────────────────────────────────────────────────────────┘

image:
  repository: compute-platform/compute-platform-operator
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# HA mode — 2 replicas with leader election.
# Only one pod is active at a time; the standby takes over on failure.
replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

metrics:
  enabled: true
  port: 8080

healthProbe:
  port: 8081

leaderElection:
  enabled: true

# ============================================================
# ACTIVE WORKFLOW — Node Assignment (default)
# ============================================================
# PURPOSE: An owner team wants to claim a specific Kubernetes node.
#
# What happens:
#   1. Operator validates the CR has an owner name and node name
#   2. Fetches the target node from the cluster
#   3. Sets an ownership label on the node (signals to schedulers
#      and other controllers that this node belongs to this owner)
#   4. Waits for an on-node agent to confirm the node is properly
#      configured (by setting an annotation)
#   5. Records the node as "ready" in a shared ConfigMap so
#      downstream systems (dashboards, schedulers) can see it
#
# To SWAP a node between owners: delete the old CR (cleanup removes
# the old label), then create a new CR with the new owner.
# Same workflow handles it — no config change needed.

operatorConfig:
  workflow:
    name: node-assignment
    description: >
      Assigns a node to an owner by labeling it, waiting for on-node
      agent confirmation, and recording readiness in a shared ConfigMap.
    steps:
      - name: validate-spec
        type: validateSpec
        description: >
          Ensure the CR has both an owner reference and a node reference.
          Fails immediately if either is missing.

      - name: fetch-target-node
        type: fetchNode
        description: >
          Retrieve the target Kubernetes node object. If the node doesn't
          exist in the cluster, the CR transitions to Failed phase.

      - name: apply-ownership-label
        type: setLabel
        description: >
          Set or correct the ownership label on the node. This label is
          the primary signal to schedulers, admission controllers, and
          other platform components that this node is claimed.
          Idempotent — if the label already has the correct value, no
          API call is made.
        onSuccess: LabelApplied
        params:
          labelKey: compute-platform.io/owner
          labelValueTemplate: "{{ .TenantName }}"

      - name: await-node-agent-completion
        type: checkAnnotation
        description: >
          Poll the node's annotations for a completion signal from the
          on-node agent. The agent is responsible for node-local setup
          (storage mounts, network config, GPU drivers, etc.).
          Requeues every 15 seconds until the annotation appears.
        waitIfNotReady: true
        onSuccess: AwaitingNodeAgent
        params:
          annotationKey: compute-platform.io/node-agent-ready
          annotationValue: "true"

      - name: update-readiness-configmap
        type: updateConfigMap
        description: >
          Record this node as ready in the platform-wide readiness
          ConfigMap. Downstream systems (capacity dashboards, automated
          schedulers) watch this ConfigMap to know which nodes are
          available for workload placement.
        params:
          configMapNamespace: compute-platform-system
          configMapName: node-readiness
          configMapKeyTemplate: "{{ .TenantName }}.{{ .NodeName }}"
          configMapValueTemplate: "ready"

    cleanupSteps:
      - name: fetch-node-for-cleanup
        type: fetchNode
        description: Fetch the node to remove the ownership label.
        continueOnFailure: true

      - name: remove-ownership-label
        type: removeLabel
        description: >
          Remove the ownership label from the node, releasing it back
          to the unassigned pool.
        continueOnFailure: true
        params:
          labelKey: compute-platform.io/owner

      - name: remove-readiness-entry
        type: removeConfigMapEntry
        description: >
          Remove this node's entry from the readiness ConfigMap so
          downstream systems no longer consider it assigned.
        continueOnFailure: true
        params:
          configMapNamespace: compute-platform-system
          configMapName: node-readiness
          configMapKeyTemplate: "{{ .TenantName }}.{{ .NodeName }}"

  reconciliation:
    requeueSeconds: 15

# ============================================================
# HOW TO: Node Swap (owner-a → owner-b on same node)
# ============================================================
# No workflow change needed. The default assignment workflow handles it:
#
#   Step 1: Delete the existing CR
#     kubectl delete tna old-assignment
#     → Cleanup workflow removes owner-a's label + ConfigMap entry
#
#   Step 2: Apply a new CR with the new owner
#     kubectl apply -f new-assignment.yaml
#     → Standard workflow applies owner-b's label, waits for agent,
#       updates ConfigMap
#
# The operator manages the entire transition automatically.

