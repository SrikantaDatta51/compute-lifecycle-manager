# What happens:
#   1. Labels the node as "pending" health gate
#   2. Waits for the GPU validation agent to confirm GPUs are healthy
#   3. Waits for the network validation agent to confirm links are up
#   4. Only after both checks pass, marks the node as "passed"
#   5. Records the node in the healthy-nodes ConfigMap
#
# This prevents unhealthy nodes from entering the assignable pool.
#
