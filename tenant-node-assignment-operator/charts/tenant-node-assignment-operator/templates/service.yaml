{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tenant-node-assignment-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-node-assignment-operator.labels" . | nindent 4 }}
spec:
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "tenant-node-assignment-operator.selectorLabels" . | nindent 4 }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "tenant-node-assignment-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-node-assignment-operator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "tenant-node-assignment-operator.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
{{- end }}
