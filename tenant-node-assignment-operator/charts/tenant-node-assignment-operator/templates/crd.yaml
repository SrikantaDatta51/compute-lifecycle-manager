apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenantnodeassignments.computeplatform.io
  labels:
    {{- include "tenant-node-assignment-operator.labels" . | nindent 4 }}
spec:
  group: computeplatform.io
  names:
    kind: TenantNodeAssignment
    listKind: TenantNodeAssignmentList
    plural: tenantnodeassignments
    singular: tenantnodeassignment
    shortNames:
      - tna
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.tenantRef.name
        - name: Node
          type: string
          jsonPath: .spec.nodeRef.name
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["tenantRef", "nodeRef"]
              properties:
                tenantRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                      minLength: 1
                nodeRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                      minLength: 1
                activation:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "LabelApplied", "AwaitingNodeAgent", "Ready", "Failed"]
                observedGeneration:
                  type: integer
                  format: int64
                message:
                  type: string
                lastTransitionTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required: ["type", "status", "lastTransitionTime", "reason", "message"]
                assignedLabel:
                  type: object
                  properties:
                    key:
                      type: string
                    value:
                      type: string
                completion:
                  type: object
                  properties:
                    acknowledged:
                      type: boolean
                readiness:
                  type: object
                  properties:
                    configMapUpdated:
                      type: boolean
