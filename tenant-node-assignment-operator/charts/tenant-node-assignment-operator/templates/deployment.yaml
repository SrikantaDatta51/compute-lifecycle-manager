apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-node-assignment-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-node-assignment-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tenant-node-assignment-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenant-node-assignment-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tenant-node-assignment-operator.serviceAccountName" . }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:{{ .Values.healthProbe.port }}
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --config-namespace={{ .Release.Namespace }}
            - --config-name={{ include "tenant-node-assignment-operator.fullname" . }}-config
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.healthProbe.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      terminationGracePeriodSeconds: 10
