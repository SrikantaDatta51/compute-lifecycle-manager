---
# ═══════════════════════════════════════════════════════════════════
# Fleet Validation — Full Certification Suite (All 8 Layers)
# ═══════════════════════════════════════════════════════════════════
# Complete node certification — all 8 test layers.
# Used for Day-0 provisioning and Post-RMA validation.
# ~3.5 hours per node.

name: full-certification
description: "Complete 8-layer node certification — Day-0 / Post-RMA"
estimated_duration_minutes: 210
sku_profiles: [h200, b200]
schedule: "on-demand"
stop_on_first_failure: false

tests:
  # ── Layer 1: GPU Hardware Health ──
  - name: dcgmi_r3
    description: "Layer 1a — DCGMI Level 3 extended diagnostics"
    command: "dcgmi diag -r 3"
    timeout_seconds: 1200
    pass_criteria:
      type: grep_absent
      pattern: "FAIL"
    failure_class: hardware
    layer: 1
    metrics:
      - name: dcgmi_r3_passed
        type: gauge
        extract: "exit_code"

  - name: dcgmi_r4
    description: "Layer 1b — DCGMI Level 4 full system validation"
    command: "dcgmi diag -r 4"
    timeout_seconds: 7200
    pass_criteria:
      type: grep_absent
      pattern: "FAIL"
    failure_class: hardware
    layer: 1
    metrics:
      - name: dcgmi_r4_passed
        type: gauge
        extract: "exit_code"

  # ── Layer 2: GPU Memory & ECC ──
  - name: ecc_check
    description: "Layer 2 — ECC error validation"
    command: "nvidia-smi -q -d ECC | grep -A2 'Volatile' | grep 'Uncorrectable'"
    timeout_seconds: 60
    pass_criteria:
      type: field_equals
      field_pattern: "Uncorrectable.*:\\s+(\\d+)"
      expected: "0"
    failure_class: hardware
    layer: 2
    metrics:
      - name: ecc_uncorrectable
        type: gauge
        extract: "field_pattern"

  # ── Layer 3: GPU Memory Bandwidth ──
  - name: nvbandwidth_h2d
    description: "Layer 3a — Host-to-Device bandwidth"
    command: "nvbandwidth -t host_to_device_memcpy_ce"
    timeout_seconds: 600
    pass_criteria:
      type: bandwidth_gte
      field: "bandwidth"
      threshold_key: "nvbw_h2d_min_gbps"
    failure_class: hardware
    layer: 3
    metrics:
      - name: nvbw_h2d_gbps
        type: gauge
        extract: "bandwidth"

  - name: nvbandwidth_d2d
    description: "Layer 3b — Device-to-Device bandwidth"
    command: "nvbandwidth -t device_to_device_memcpy_read_ce"
    timeout_seconds: 600
    pass_criteria:
      type: bandwidth_gte
      field: "bandwidth"
      threshold_key: "nvbw_d2d_min_gbps"
    failure_class: hardware
    layer: 3
    metrics:
      - name: nvbw_d2d_gbps
        type: gauge
        extract: "bandwidth"

  - name: nvbandwidth_bidir
    description: "Layer 3c — Bidirectional D2D bandwidth"
    command: "nvbandwidth -t device_to_device_bidirectional_memcpy_read_ce"
    timeout_seconds: 600
    pass_criteria:
      type: bandwidth_gte
      field: "bandwidth"
      threshold_key: "nvbw_bidir_min_gbps"
    failure_class: hardware
    layer: 3
    metrics:
      - name: nvbw_bidir_gbps
        type: gauge
        extract: "bandwidth"

  # ── Layer 4: NVLink & NVSwitch ──
  - name: nvlink_status
    description: "Layer 4a — NVLink connection status"
    command: "nvidia-smi nvlink --status"
    timeout_seconds: 120
    pass_criteria:
      type: grep_absent
      pattern: "inactive"
    failure_class: hardware
    layer: 4
    metrics:
      - name: nvlink_all_active
        type: gauge
        extract: "exit_code"

  - name: nvlink_errors
    description: "Layer 4b — NVLink error counters"
    command: "nvidia-smi nvlink -e"
    timeout_seconds: 120
    pass_criteria:
      type: all_values_below
      threshold: 100
    failure_class: hardware
    layer: 4
    metrics:
      - name: nvlink_error_count
        type: gauge
        extract: "max_value"

  # ── Layer 5: Intra-Node NCCL ──
  - name: nccl_allreduce
    description: "Layer 5a — NCCL AllReduce (8 GPUs, single node)"
    command: >-
      docker run --rm --gpus all --ipc=host --ulimit memlock=-1
      ${NCCL_CONTAINER_IMAGE}
      ${NCCL_TESTS_PATH}/all_reduce_perf
      -b 8 -e 4G -f 2 -g ${GPU_COUNT} -w 5 -n 100
    timeout_seconds: 1800
    pass_criteria:
      type: bandwidth_gte
      field: "busbw"
      threshold_key: "nccl_allreduce_min_busbw_gbps"
    failure_class: hardware
    layer: 5
    metrics:
      - name: nccl_allreduce_busbw_gbps
        type: gauge
        extract: "busbw"

  - name: nccl_allgather
    description: "Layer 5b — NCCL AllGather"
    command: >-
      docker run --rm --gpus all --ipc=host --ulimit memlock=-1
      ${NCCL_CONTAINER_IMAGE}
      ${NCCL_TESTS_PATH}/all_gather_perf
      -b 8 -e 4G -f 2 -g ${GPU_COUNT} -w 5 -n 100
    timeout_seconds: 1800
    pass_criteria:
      type: bandwidth_gte
      field: "busbw"
      threshold_key: "nccl_allgather_min_busbw_gbps"
    failure_class: hardware
    layer: 5
    metrics:
      - name: nccl_allgather_busbw_gbps
        type: gauge
        extract: "busbw"

  - name: nccl_reducescatter
    description: "Layer 5c — NCCL ReduceScatter"
    command: >-
      docker run --rm --gpus all --ipc=host --ulimit memlock=-1
      ${NCCL_CONTAINER_IMAGE}
      ${NCCL_TESTS_PATH}/reduce_scatter_perf
      -b 8 -e 4G -f 2 -g ${GPU_COUNT} -w 5 -n 100
    timeout_seconds: 1800
    pass_criteria:
      type: bandwidth_gte
      field: "busbw"
      threshold_key: "nccl_reducescatter_min_busbw_gbps"
    failure_class: hardware
    layer: 5
    metrics:
      - name: nccl_reducescatter_busbw_gbps
        type: gauge
        extract: "busbw"

  # ── Layer 6: Compute (HPL) ──
  - name: hpl_benchmark
    description: "Layer 6 — HPL High-Performance Linpack"
    command: >-
      docker run --rm --gpus all --ipc=host --ulimit memlock=-1
      ${HPL_CONTAINER_IMAGE}
      mpirun --allow-run-as-root -np ${GPU_COUNT}
      --bind-to none /workspace/hpl.sh
      --dat /workspace/hpl-linux-x86_64/sample-dat/HPL-dgx-${GPU_COUNT}GPU.dat
    timeout_seconds: 7200
    pass_criteria:
      type: performance_gte
      field: "gflops"
      threshold_key: "hpl_min_tflops"
    failure_class: hardware
    layer: 6
    metrics:
      - name: hpl_tflops
        type: gauge
        extract: "gflops"

  # ── Layer 7: AI Workload (NeMo) ──
  - name: nemo_inference
    description: "Layer 7 — NeMo LLM inference benchmark"
    command: >-
      docker run --rm --gpus all --ipc=host --ulimit memlock=-1 --shm-size=32g
      ${NEMO_CONTAINER_IMAGE}
      python3 -c "
      import torch, time, sys;
      n=torch.cuda.device_count(); assert n==${GPU_COUNT};
      results=[];
      [exec('''
      torch.cuda.set_device({g});
      a=torch.randn(4096,4096,dtype=torch.bfloat16,device=\"cuda:{g}\");
      b=torch.randn(4096,4096,dtype=torch.bfloat16,device=\"cuda:{g}\");
      [torch.matmul(a,b) for _ in range(5)]; torch.cuda.synchronize();
      t0=time.time(); [torch.matmul(a,b) for _ in range(100)]; torch.cuda.synchronize();
      tf=(2*4096**3*100)/((time.time()-t0)*1e12);
      results.append(tf); print(f\"GPU {g}: {tf:.1f} TFLOPS\")
      '''.format(g=g)) for g in range(n)];
      avg=sum(results)/len(results); print(f'Average: {avg:.1f} TFLOPS');
      print('NeMo inference benchmark PASSED')
      "
    timeout_seconds: 3600
    pass_criteria:
      type: grep_present
      pattern: "PASSED"
    failure_class: hardware
    layer: 7
    metrics:
      - name: nemo_inference_tflops
        type: gauge
        extract: "tflops_avg"

  # ── Layer 8: InfiniBand Fabric ──
  - name: ib_health
    description: "Layer 8a — InfiniBand port health"
    command: "ibstat | grep -E 'State:|Rate:'"
    timeout_seconds: 120
    pass_criteria:
      type: grep_present
      pattern: "Active"
    failure_class: hardware
    layer: 8
    metrics:
      - name: ib_ports_active
        type: gauge
        extract: "count_pattern"

  - name: ib_counters
    description: "Layer 8b — IB error counters"
    command: "perfquery -x 2>/dev/null || echo 'perfquery not available'"
    timeout_seconds: 120
    pass_criteria:
      type: grep_absent
      pattern: "SymbolErrorCounter.*[1-9]"
    failure_class: hardware
    layer: 8
    metrics:
      - name: ib_symbol_errors
        type: gauge
        extract: "exit_code"
