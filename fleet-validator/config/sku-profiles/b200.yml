---
# ═══════════════════════════════════════════════════════════════════
# SKU Profile — NVIDIA DGX B200
# ═══════════════════════════════════════════════════════════════════
# Performance thresholds for DGX B200 systems.
# GPU: B200 192GB HBM3e × 8
# Interconnect: NVLink 5 (1800 GB/s bidirectional per GPU)
# Network: 8× ConnectX-7 400G InfiniBand + BlueField-3 DPU

sku_name: b200
gpu_model: "B200"
gpu_memory_gb: 192
gpu_count: 8
nvlink_generation: 5
nvlink_bw_per_gpu_gbps: 1800

# ── NCCL Bandwidth Thresholds (GB/s) ──
nccl_allreduce_min_busbw_gbps: 380
nccl_allgather_min_busbw_gbps: 350
nccl_reducescatter_min_busbw_gbps: 350
nccl_sendrecv_min_busbw_gbps: 200

# ── Multi-Node NCCL Thresholds ──
nccl_multinode_allreduce_min_busbw_gbps: 200
nccl_multinode_allgather_min_busbw_gbps: 180
nccl_multinode_reducescatter_min_busbw_gbps: 180

# ── nvbandwidth Thresholds (GB/s) ──
nvbw_h2d_min_gbps: 30
nvbw_d2d_min_gbps: 1600
nvbw_bidir_min_gbps: 1400
nvbw_all_to_one_min_gbps: 400

# ── HPL Thresholds ──
hpl_min_tflops: 60

# ── Containers ──
nccl_container_image: "nvcr.io/nvidia/pytorch:24.04-py3"
nccl_tests_path: "/opt/nccl_tests/build"
hpl_container_image: "nvcr.io/nvidia/hpc-benchmarks:24.03"
nemo_container_image: "nvcr.io/nvidia/nemo:24.03.01"

# ── InfiniBand Device Mapping ──
# B200 has BlueField-3 DPU — different mlx5 mapping than H200
ib_devices: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7"
ucx_device: "mlx5_0:1"
nccl_socket_ifname: "bond0"

# ── Temperature Thresholds ──
gpu_temp_warning_c: 80
gpu_temp_critical_c: 90
